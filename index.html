<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Маникюр 💅</title>

<style>
body {
    font-family: Arial;
    background: #fff0f5;
    text-align: center;
}

.card {
    background: white;
    padding: 10px;
    margin: 10px;
    border-radius: 10px;
    display: inline-block;
}

button {
    background: pink;
    border: none;
    padding: 5px 10px;
    cursor: pointer;
}

.admin {
    margin-top: 30px;
}
</style>
</head>

<body>

<h1>💅 Запись на маникюр</h1>

<input type="date" id="date">

<div id="slots"></div>

<div class="admin">
<h2>Админ</h2>
<input id="login" placeholder="логин">
<input id="password" type="password" placeholder="пароль">
<button onclick="login()">Войти</button>

<div id="adminPanel" style="display:none;">
    <h3>Добавить слот</h3>
    <input type="date" id="adminDate">
    <input placeholder="Время (14:00)" id="time">
    <button onclick="addSlot()">Добавить</button>
</div>
</div>

<script>
const API = "https://ТВОЙ-СЕРВЕР.onrender.com";

let isAdmin = false;

// загрузка
async function loadSlots() {
    const res = await fetch(API + "/slots");
    const data = await res.json();

    const selectedDate = document.getElementById("date").value;

    const container = document.getElementById("slots");
    container.innerHTML = "";

    data
    .filter(s => !selectedDate || s.date === selectedDate)
    .forEach(slot => {
        const div = document.createElement("div");
        div.className = "card";

        div.innerHTML = `
            <b>${slot.date}</b><br>
            ${slot.time}<br>
            ${slot.booked 
                ? "❌ занято" 
                : `<button onclick="book('${slot._id}')">Записаться</button>`
            }
        `;

        container.appendChild(div);
    });
}

// запись
async function book(id) {
    const name = prompt("Ваше имя:");
    if (!name) return;

    await fetch(API + "/book", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({ id, name })
    });

    loadSlots();
}

// логин
async function login() {
    const login = document.getElementById("login").value;
    const password = document.getElementById("password").value;

    const res = await fetch(API + "/login", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({ login, password })
    });

    const data = await res.json();

    if (data.success) {
        isAdmin = true;
        document.getElementById("adminPanel").style.display = "block";
        alert("Вход выполнен");
    } else {
        alert("Ошибка");
    }
}

// добавить слот
async function addSlot() {
    const date = document.getElementById("adminDate").value;
    const time = document.getElementById("time").value;

    await fetch(API + "/add-slot", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({ date, time })
    });

    loadSlots();
}

document.getElementById("date").addEventListener("change", loadSlots);

loadSlots();
</script>

</body>
</html>
